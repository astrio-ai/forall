name: Release smoke test
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - install.sh
      - .github/workflows/release-smoke.yml

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck install.sh
