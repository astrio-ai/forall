name: Crates CI

on:
  push:
    branches: [main]
    paths:
      - 'Cargo.toml'
      - 'crates/**'
      - '.github/workflows/crates.yml'
  pull_request:
    paths:
      - 'Cargo.toml'
      - 'crates/**'
      - '.github/workflows/crates.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run workspace tests
        run: cargo test --workspace
